test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Use rails credentials:edit to set the AWS secrets (as aws:access_key_id|secret_access_key)
amazon:
  service: S3
  access_key_id: <%= ENV['AWS_ACCESS_KEY_ID'] %>
  secret_access_key: <%= ENV['AWS_SECRET_ACCESS_KEY'] %>
  region: <%= ENV['AWS_REGION'] || 'ap-southeast-1' %>
  bucket: <%= ENV['S3_BUCKET_NAME'] %>
  
  # Use CloudFront CDN for assets
  # cdn_host: <%= ENV['CDN_HOST'] %>
  
  # Optional: Use path_style for S3 compatible services like MinIO
  # path_style: true
  
  # Optional: Set to true to use AWS IAM Instance Profile credentials
  # use_iam_profile: true
  
  # Optional: Set to true to enable server-side encryption
  # encrypt: true
  
  # Optional: Set the storage class for uploaded files
  # upload:
  #   server_side_encryption: 'AES256' # or 'aws:kms'
  #   cache_control: 'public, max-age=31536000, immutable'

# Remember not to check in your GCS key file to a repository
google:
  service: GCS
  project: your_project_id
  credentials: <%= Rails.root.join("path/to/gcs.key") %>
  bucket: your_own_bucket

# Use rails credentials:edit to set the Azure Storage secret (as azure_storage:storage_access_key)
microsoft:
  service: AzureStorage
  storage_account_name: your_account_name
  storage_access_key: <%= Rails.application.credentials.dig(:azure_storage, :storage_access_key) %>
  container: your_container_name

