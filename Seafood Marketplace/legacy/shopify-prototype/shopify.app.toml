# Shop-specific configuration for app
name = "Seafood Marketplace"
client_id = ""
application_url = "https://your-app-url.com"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_products,write_orders,read_orders,write_customers,read_customers"

[auth]
redirect_urls = ["https://your-app-url.com/auth/callback"]

[webhooks]
api_version = "2024-01"

[webhooks.topics]
# Add webhook subscriptions here
# Example:
# PRODUCTS_CREATE = "https://your-app-url.com/webhooks/products_create"

[webhooks.include_fields]
# Include specific fields in webhook payloads
# Example:
# products/update = ["id", "title", "vendor"]

[api]
# API version to use (defaults to the latest stable version)
api_version = "2024-01"
